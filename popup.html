<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="header">
      <div class="logo">
        <div class="logo-icon">D</div>
        <h1>DoorIan</h1>
      </div>
      <button id="settingsBtn" class="icon-btn" title="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"></circle>
          <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
        </svg>
      </button>
    </header>

    <!-- Main View -->
    <div id="mainView">
      <div id="jobDetected" class="job-card" style="display:none;">
        <div class="job-card-header">
          <div class="job-info">
            <h2 id="jobTitle" class="job-title">-</h2>
            <p id="jobCompany" class="job-company">-</p>
          </div>
        </div>
        <div class="job-details">
          <div class="detail-row">
            <span class="detail-label">Pay</span>
            <span id="jobPay" class="detail-value">-</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Location</span>
            <span id="jobLocation" class="detail-value">-</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Type</span>
            <span id="jobType" class="detail-value">-</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Deadline</span>
            <span id="jobDeadline" class="detail-value">-</span>
          </div>
        </div>
        <div class="actions">
          <button id="bookmarkBtn" class="btn btn-primary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
            </svg>
            Bookmark
          </button>
          <button id="appliedBtn" class="btn btn-secondary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
            Mark Applied
          </button>
        </div>
      </div>

      <div id="noJob" class="no-job" style="display:none;">
        <p>Navigate to a job listing on Handshake, LinkedIn, or Indeed to bookmark it.</p>
      </div>

      <div class="section">
        <div class="section-header">
          <h3>Bookmarked Jobs</h3>
          <span id="bookmarkCount" class="badge">0</span>
        </div>
        <div id="bookmarkedList" class="job-list"></div>
      </div>

      <div class="section">
        <div class="section-header">
          <h3>Applied</h3>
          <span id="appliedCount" class="badge">0</span>
        </div>
        <div id="appliedList" class="job-list"></div>
      </div>

      <button id="dashboardBtn" class="btn btn-dashboard">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect>
        </svg>
        Open Dashboard
      </button>

      <button id="exportBtn" class="btn btn-export">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        Export to CSV
      </button>
    </div>

    <!-- Settings View -->
    <div id="settingsView" style="display:none;">
      <button id="backBtn" class="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Back
      </button>
      <h2 class="settings-title">Settings</h2>

      <div class="setting-group">
        <label class="setting-label">Export Format</label>
        <select id="exportFormat" class="setting-select">
          <option value="csv">CSV (Google Sheets / Excel)</option>
          <option value="json">JSON</option>
        </select>
      </div>

      <div class="setting-group">
        <label class="setting-label">Auto-detect jobs on</label>
        <div class="checkbox-group">
          <label class="checkbox-label">
            <input type="checkbox" id="detectHandshake" checked> Handshake
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="detectLinkedin" checked> LinkedIn
          </label>
          <label class="checkbox-label">
            <input type="checkbox" id="detectIndeed" checked> Indeed
          </label>
        </div>
      </div>

      <div class="setting-group">
        <button id="clearDataBtn" class="btn btn-danger">Clear All Data</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
